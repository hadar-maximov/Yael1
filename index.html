<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>לומדים עם סטיצ׳לי 🌺</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#071A2E;--ocean:#0C2D4E;--card:#122840;
  --teal:#0EA5E9;--bright:#38BDF8;--pink:#F472B6;
  --green:#10B981;--gold:#FBBF24;--purple:#A78BFA;
  --coral:#FB7185;--orange:#FB923C;
  --text:#F0F9FF;--muted:#7DD3FC;--sub:#475569;
  --font:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:var(--font);background:var(--deep);direction:rtl;overflow:hidden;touch-action:manipulation;user-select:none;}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.on{display:flex;}

/* ── HOME SCREEN ── */
#s-home{background:var(--deep);overflow-y:auto;}
.home-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.home-content{position:relative;z-index:1;padding:18px 16px 32px;}
.home-header{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.home-title{font-size:24px;font-weight:900;color:var(--text);line-height:1.2;}
.home-sub{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:20px;}
.topic-grid{display:flex;flex-direction:column;gap:12px;}
.tcard{
  border-radius:20px;padding:18px 16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:transform .14s;
  position:relative;overflow:hidden;
}
.tcard:active{transform:scale(.97);}
.tcard-icon{
  width:54px;height:54px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
  background:rgba(255,255,255,.18);
}
.tcard-info{flex:1;}
.tcard-name{font-size:17px;font-weight:900;color:#fff;margin-bottom:3px;}
.tcard-desc{font-size:12px;font-weight:700;color:rgba(255,255,255,.72);}
.tcard-arrow{font-size:20px;color:rgba(255,255,255,.6);}
.tcard-stars{font-size:12px;font-weight:800;color:rgba(255,255,255,.85);margin-top:4px;}
.tcard-shine{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07);}

/* ── TOPIC SCREEN ── */
#s-topic{background:var(--deep);}
.topic-topbar{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px 8px;flex-shrink:0;
}
.btn-back{background:rgba(255,255,255,.1);border:none;border-radius:12px;width:36px;height:36px;font-size:18px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;}
.topic-topbar-name{font-size:16px;font-weight:900;color:var(--text);flex:1;}
.mode-tabs{display:flex;gap:6px;padding:0 14px 8px;flex-shrink:0;}
.mtab{flex:1;padding:10px 6px;border:none;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.07);color:var(--muted);}
.mtab.on{color:#fff;}

/* ── LEARN MODE ── */
.learn-wrap{flex:1;overflow-y:auto;padding:8px 14px 24px;display:flex;flex-direction:column;gap:10px;}
.step-progress{display:flex;justify-content:center;gap:6px;padding:4px 0;}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s;}
.step-dot.on{width:22px;border-radius:4px;}
.mascot-row{display:flex;align-items:flex-end;gap:10px;}
.mascot-bubble{
  flex:1;background:rgba(255,255,255,.1);border-radius:18px 18px 18px 4px;
  padding:13px 14px;font-size:15px;font-weight:700;color:var(--text);line-height:1.5;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.step-visual{
  background:rgba(255,255,255,.06);border-radius:18px;
  padding:18px;min-height:140px;
  display:flex;align-items:center;justify-content:center;
  animation:fadeUp .4s ease .1s both;
}
.step-nav{display:flex;gap:8px;margin-top:4px;}
.btn-prev{background:rgba(255,255,255,.08);border:none;border-radius:12px;padding:13px 16px;font-family:var(--font);font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;}
.btn-next{flex:1;border:none;border-radius:12px;padding:14px;font-family:var(--font);font-size:16px;font-weight:900;color:#fff;cursor:pointer;transition:transform .1s;}
.btn-next:active{transform:scale(.97);}

/* ── PRACTICE MODE ── */
.practice-wrap{flex:1;overflow-y:auto;padding:8px 14px 20px;display:flex;flex-direction:column;gap:8px;}
.q-card{background:rgba(255,255,255,.08);border-radius:18px;padding:16px 14px 13px;text-align:center;}
.q-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.q-display{font-size:34px;font-weight:900;color:var(--text);direction:ltr;line-height:1.2;}
.q-display.col-mult{font-family:monospace;font-size:28px;line-height:1.6;text-align:center;}
.arow{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;direction:ltr;}
.abox{width:72px;height:52px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:12px;font-size:26px;font-weight:900;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.abox.act{border-color:var(--teal);background:rgba(14,165,233,.2);}
.abox.emp{color:rgba(255,255,255,.25);}
.rlbl{font-size:12px;font-weight:700;color:var(--muted);}
.frac-q{font-size:28px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px;direction:ltr;}
.frac-q .frac{display:inline-flex;flex-direction:column;align-items:center;line-height:1.1;}
.frac-q .frac .line{width:100%;height:2px;background:var(--text);margin:2px 0;}
.idk{background:none;border:none;color:var(--muted);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-align:center;}
.npad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;direction:ltr;}
.nk{background:rgba(255,255,255,.1);border:none;border-radius:13px;height:54px;font-size:24px;font-weight:900;font-family:var(--font);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .08s;}
.nk:active{transform:scale(.9);}
.nk.del{font-size:18px;color:var(--muted);}
.nk.ok{color:#fff;font-size:22px;}
.fbrow{border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;min-height:54px;transition:background .2s;}
.fbrow.ok{background:rgba(16,185,129,.15);}
.fbrow.ng{background:rgba(251,113,133,.12);}
.fbrow.idle{background:rgba(255,255,255,.05);}
.fbmsg{font-size:13px;font-weight:700;color:var(--text);flex:1;line-height:1.4;white-space:pre-line;}
.streak-row{display:flex;gap:7px;}
.streak-chip{flex:1;background:rgba(255,255,255,.06);border-radius:12px;padding:9px 4px;text-align:center;font-size:12px;color:var(--muted);font-weight:700;}
.streak-chip strong{display:block;font-size:20px;font-weight:900;color:var(--text);}

@keyframes fOK{0%,100%{background:rgba(255,255,255,.08)}40%{background:rgba(16,185,129,.25)}}
@keyframes fNG{0%,100%{background:rgba(255,255,255,.08)}40%{background:rgba(251,113,133,.18)}}
.flash-ok{animation:fOK .5s ease;}
.flash-ng{animation:fNG .5s ease;}

/* ── VISUAL HELPERS ── */
.dots-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center;width:100%;}
.dot-group{display:flex;flex-wrap:wrap;gap:5px;padding:8px;border-radius:12px;border:2px dashed rgba(255,255,255,.25);}
.dot{width:20px;height:20px;border-radius:50%;}
.dot-rest{display:flex;flex-wrap:wrap;gap:5px;padding:6px;}
.fbar-wrap{width:100%;display:flex;gap:3px;height:38px;border-radius:8px;overflow:hidden;}
.fbar-part{flex:1;border-radius:4px;border:2px solid rgba(255,255,255,.15);transition:background .4s;}
.fbar-part.filled{}
.colmult-wrap{display:flex;flex-direction:column;align-items:center;font-size:26px;font-weight:900;font-family:monospace;color:var(--text);gap:2px;direction:ltr;}
.colmult-line{width:100%;height:3px;border-radius:2px;background:rgba(255,255,255,.4);margin:4px 0;}
.colmult-carry{font-size:14px;color:var(--gold);min-height:18px;}
.colmult-num{letter-spacing:8px;}
.colmult-res{color:var(--gold);}
.rect-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;}
.eq-big{font-size:26px;font-weight:900;color:var(--text);text-align:center;direction:ltr;background:rgba(255,255,255,.06);border-radius:12px;padding:12px 20px;}
.eq-big span{color:var(--gold);}
.highlight{color:var(--gold);}
.step-title{font-size:14px;font-weight:900;color:var(--muted);text-align:center;margin-bottom:4px;}

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:20px;}
.mbg.on{display:flex;}
.mbox{background:var(--ocean);border-radius:26px;padding:32px 24px;text-align:center;width:100%;max-width:320px;animation:pu .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes pu{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.memj{font-size:64px;margin-bottom:8px;}
.mtit{font-size:24px;font-weight:900;color:var(--text);margin-bottom:8px;}
.mbod{font-size:14px;font-weight:700;color:var(--muted);line-height:1.6;margin-bottom:22px;}
.bmoo{width:100%;padding:15px;border:none;border-radius:14px;font-family:var(--font);font-size:17px;font-weight:900;color:#fff;cursor:pointer;}

.cc{position:fixed;top:-10px;z-index:400;pointer-events:none;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div id="s-home" class="screen on">
  <div class="home-bg" id="home-bg"></div>
  <div class="home-content">
    <div class="home-header">
      <div id="mascot-home"></div>
      <div>
        <div class="home-title">שלום! בואי ללמוד<br>עם סטיצ׳לי 🌺</div>
      </div>
    </div>
    <div class="home-sub">בחרי נושא ונתחיל!</div>
    <div class="topic-grid" id="topic-grid"></div>
  </div>
</div>

<!-- ═══ TOPIC ═══ -->
<div id="s-topic" class="screen">
  <div class="topic-topbar">
    <button class="btn-back" onclick="goHome()">←</button>
    <span class="topic-topbar-name" id="topic-topbar-name"></span>
    <span id="topbar-emoji" style="font-size:20px"></span>
  </div>
  <div class="mode-tabs">
    <button class="mtab on" id="tab-learn" onclick="setMode('learn')">📖 הסבר</button>
    <button class="mtab" id="tab-practice" onclick="setMode('practice')">🎮 תרגול</button>
  </div>

  <!-- LEARN -->
  <div id="learn-area" class="learn-wrap">
    <div class="step-progress" id="step-dots"></div>
    <div class="mascot-row">
      <div id="mascot-step"></div>
      <div class="mascot-bubble" id="step-speech"></div>
    </div>
    <div class="step-visual" id="step-visual"></div>
    <div class="step-nav">
      <button class="btn-prev" id="btn-prev" onclick="prevStep()">← אחורה</button>
      <button class="btn-next" id="btn-next" onclick="nextStep()">הבא ←</button>
    </div>
  </div>

  <!-- PRACTICE -->
  <div id="practice-area" class="practice-wrap" style="display:none">
    <div class="streak-row">
      <div class="streak-chip">🔥<strong id="st-streak">0</strong>רצף</div>
      <div class="streak-chip">✅<strong id="st-ok">0</strong>נכון</div>
      <div class="streak-chip">⭐<strong id="st-stars">0</strong>כוכבים</div>
    </div>
    <div class="q-card" id="q-card">
      <div class="q-label" id="q-label">שאלה</div>
      <div class="q-display" id="q-display"></div>
      <div class="arow" id="arow"></div>
    </div>
    <button class="idk" onclick="idk()">לא יודעת? לחצי לתשובה 🙈</button>
    <div class="npad">
      <button class="nk" onclick="nk(1)">1</button>
      <button class="nk" onclick="nk(2)">2</button>
      <button class="nk" onclick="nk(3)">3</button>
      <button class="nk" onclick="nk(4)">4</button>
      <button class="nk" onclick="nk(5)">5</button>
      <button class="nk" onclick="nk(6)">6</button>
      <button class="nk" onclick="nk(7)">7</button>
      <button class="nk" onclick="nk(8)">8</button>
      <button class="nk" onclick="nk(9)">9</button>
      <button class="nk del" onclick="nd()">⌫</button>
      <button class="nk" onclick="nk(0)">0</button>
      <button class="nk ok" id="ok-btn" onclick="no()">✓</button>
    </div>
    <div class="fbrow idle" id="fbrow">
      <div style="font-size:28px" id="fbani">✨</div>
      <div class="fbmsg" id="fbmsg">ענה נכון ותצברי כוכבים! 🌟</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="mbg" id="modal">
  <div class="mbox">
    <div class="memj" id="memj">🎉</div>
    <div class="mtit" id="mtit"></div>
    <div class="mbod" id="mbod"></div>
    <button class="bmoo" id="bmoo" onclick="closeModal()">המשיכי! 🚀</button>
  </div>
</div>

<script>
/* ─── SVG HELPERS ─── */
const NS='http://www.w3.org/2000/svg';
function E(t,a,p){const e=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));if(p)p.appendChild(e);return e;}
const ri=n=>Math.floor(Math.random()*n);

/* ─── MASCOT ─── */
function mascotSVG(mood='happy',size=52){
  const b='#38BDF8',e='#0EA5E9',w='#fff',d='#0F172A',c='#7DD3FC';
  const smile = mood==='happy'
    ? `<path d="M 38 76 Q 50 88 62 76" stroke="${d}" stroke-width="3.5" fill="none" stroke-linecap="round"/>`
    : mood==='excited'
    ? `<ellipse cx="50" cy="79" rx="11" ry="8" fill="${d}"/><ellipse cx="50" cy="79" rx="8" ry="5" fill="#FF6B6B"/>`
    : mood==='think'
    ? `<path d="M 40 78 Q 50 74 60 78" stroke="${d}" stroke-width="3" fill="none" stroke-linecap="round"/>` 
    : `<path d="M 38 76 Q 50 88 62 76" stroke="${d}" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 110" style="flex-shrink:0">
    <ellipse cx="24" cy="30" rx="14" ry="24" fill="${e}" transform="rotate(-25 24 30)"/>
    <ellipse cx="76" cy="30" rx="14" ry="24" fill="${e}" transform="rotate(25 76 30)"/>
    <circle cx="50" cy="64" r="41" fill="${b}"/>
    <ellipse cx="37" cy="49" rx="11" ry="7" fill="rgba(255,255,255,.22)"/>
    <ellipse cx="35" cy="60" rx="11" ry="12" fill="${w}"/>
    <ellipse cx="65" cy="60" rx="11" ry="12" fill="${w}"/>
    <circle cx="37" cy="62" r="8" fill="${d}"/>
    <circle cx="67" cy="62" r="8" fill="${d}"/>
    <circle cx="39" cy="59" r="3" fill="${w}"/>
    <circle cx="69" cy="59" r="3" fill="${w}"/>
    <circle cx="46" cy="71" r="2.2" fill="${e}"/>
    <circle cx="54" cy="71" r="2.2" fill="${e}"/>
    ${smile}
    <ellipse cx="27" cy="72" rx="7" ry="4" fill="${c}" opacity=".5"/>
    <ellipse cx="73" cy="72" rx="7" ry="4" fill="${c}" opacity=".5"/>
  </svg>`;
}

/* ─── VISUAL BUILDERS ─── */
function dotsVis(total, groupSize, step){
  const groups = Math.floor(total/groupSize);
  const rest = total % groupSize;
  const cols = ['#38BDF8','#F472B6','#10B981','#FBBF24','#A78BFA'];
  let html = '<div class="dots-wrap">';
  if(step===0){
    // all dots ungrouped
    for(let i=0;i<total;i++) html+=`<div class="dot" style="background:${cols[0]}"></div>`;
  } else {
    for(let g=0;g<groups;g++){
      html+=`<div class="dot-group">`;
      for(let i=0;i<groupSize;i++) html+=`<div class="dot" style="background:${cols[g%cols.length]}"></div>`;
      html+=`</div>`;
    }
    if(rest>0){
      html+=`<div class="dot-rest">`;
      for(let i=0;i<rest;i++) html+=`<div class="dot" style="background:#94A3B8"></div>`;
      html+=`</div>`;
    }
  }
  html+='</div>';
  return html;
}

function fracBar(denom, filled, color='#A78BFA', label=''){
  let parts='';
  for(let i=0;i<denom;i++){
    const f=i<filled;
    parts+=`<div class="fbar-part ${f?'filled':''}" style="${f?`background:${color}`:'background:rgba(255,255,255,.06)'}"></div>`;
  }
  const labelHtml = label ? `<div style="text-align:center;font-size:15px;font-weight:800;color:#F0F9FF;margin-top:6px;direction:ltr">${label}</div>` : '';
  return `<div style="width:100%"><div class="fbar-wrap">${parts}</div>${labelHtml}</div>`;
}

function pizzaVis(denom, filled, color='#FB923C', label='', size=120){
  const cx=size/2, cy=size/2, r=size/2-4;
  const sliceAngle = 2*Math.PI/denom;
  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;flex-shrink:0">`;
  svg+=`<circle cx="${cx}" cy="${cy+3}" r="${r}" fill="rgba(0,0,0,.25)"/>`;
  for(let i=0;i<denom;i++){
    const a1 = -Math.PI/2 + i*sliceAngle;
    const a2 = a1 + sliceAngle;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const large=sliceAngle>Math.PI?1:0;
    const fill = i<filled ? color : 'rgba(255,255,255,.1)';
    const stroke = i<filled ? 'rgba(0,0,0,.25)' : 'rgba(255,255,255,.15)';
    svg+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
    if(i<filled){
      const am=(a1+a2)/2, rm=r*0.58;
      const tx=cx+rm*Math.cos(am), ty=cy+rm*Math.sin(am);
      svg+=`<circle cx="${tx}" cy="${ty}" r="4" fill="#C0392B" opacity=".9"/>`;
      svg+=`<circle cx="${tx-7}" cy="${ty+5}" r="3" fill="#7B3F00" opacity=".7"/>`;
    }
  }
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#D4A017" stroke-width="5" opacity=".6"/>`;
  for(let i=0;i<denom;i++){
    const a=(-Math.PI/2)+i*sliceAngle;
    svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="rgba(0,0,0,.3)" stroke-width="1.5"/>`;
  }
  svg+=`</svg>`;
  // Build stacked fraction label
  const fontSize = size < 110 ? 15 : 17;
  const labelHtml = label
    ? `<div style="font-size:${fontSize}px;font-weight:900;color:#F0F9FF;margin-top:6px;text-align:center;display:flex;flex-direction:column;align-items:center;direction:ltr">
        <span>${filled}</span>
        <span style="display:block;height:2px;background:#F0F9FF;width:24px;border-radius:1px;margin:2px 0"></span>
        <span>${denom}</span>
       </div>`
    : '';
  return `<div style="display:flex;flex-direction:column;align-items:center">${svg}${labelHtml}</div>`;
}

function fracDisplay(num, denom){
  return `<span style="display:inline-flex;flex-direction:column;align-items:center;line-height:1.1;direction:ltr;font-size:28px;font-weight:900"><span>${num}</span><span style="width:100%;height:3px;background:#F0F9FF;display:block;margin:3px 0;border-radius:2px"></span><span>${denom}</span></span>`;
}

function fracInline(num, denom, color='#F0F9FF'){
  return `<span style="display:inline-flex;flex-direction:column;align-items:center;line-height:1;direction:ltr;vertical-align:middle;margin:0 2px"><span style="font-size:.75em;font-weight:900;color:${color}">${num}</span><span style="width:100%;height:2px;background:${color};display:block;margin:2px 0;border-radius:1px;min-width:18px"></span><span style="font-size:.75em;font-weight:900;color:${color}">${denom}</span></span>`;
}

function colMultVis(a, b, step){
  const units = (a%10)*b;
  const carry = Math.floor(units/10);
  const unitsDigit = units%10;
  const result = a*b;
  const a1 = Math.floor(a/10); // tens digit of a
  const a0 = a%10;             // units digit of a

  // Fixed cell width per digit column
  const cw=44, ch=48, x0=30;
  const col1=x0, col2=x0+cw; // tens, units columns
  const row1=10, row2=row1+ch, row3=row2+ch;
  const svgW=x0*2+cw*2+10, svgH=row3+ch+30;

  let svg=`<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;direction:ltr;font-family:Nunito,Arial;font-weight:900">`;

  // ── Row 1: carry ──
  if(step>=1 && carry>0){
    svg+=`<text x="${col1+cw/2}" y="${row1+14}" text-anchor="middle" font-size="18" fill="#FBBF24">${carry}</text>`;
  }

  // ── Row 2: top number (a) ──
  // tens digit
  svg+=`<text x="${col1+cw/2}" y="${row2}" text-anchor="middle" font-size="34" fill="${step===1?'#F0F9FF':'#F0F9FF'}">${a1}</text>`;
  // units digit — highlight in step 1
  svg+=`<text x="${col2+cw/2}" y="${row2}" text-anchor="middle" font-size="34" fill="${step===1?'#FBBF24':'#F0F9FF'}">${a0}</text>`;

  // ── Row 3: × b ──
  svg+=`<text x="${col1+cw/2}" y="${row3}" text-anchor="middle" font-size="30" fill="#94A3B8">×</text>`;
  svg+=`<text x="${col2+cw/2}" y="${row3}" text-anchor="middle" font-size="34" fill="${step===1?'#FBBF24':'#F0F9FF'}">${b}</text>`;

  // ── Divider line ──
  const ly=row3+14;
  svg+=`<line x1="${x0-4}" y1="${ly}" x2="${svgW-x0+4}" y2="${ly}" stroke="rgba(255,255,255,.45)" stroke-width="2.5" stroke-linecap="round"/>`;

  // ── Result row ──
  const ry2=ly+42;
  if(step===0){
    svg+=`<text x="${col1+cw/2}" y="${ry2}" text-anchor="middle" font-size="34" fill="rgba(255,255,255,.2)">?</text>`;
    svg+=`<text x="${col2+cw/2}" y="${ry2}" text-anchor="middle" font-size="34" fill="rgba(255,255,255,.2)">?</text>`;
  } else if(step===1){
    // only units digit of result so far
    svg+=`<text x="${col2+cw/2}" y="${ry2}" text-anchor="middle" font-size="34" fill="#FBBF24">${unitsDigit}</text>`;
    // explanation
    svg+=`<text x="${svgW/2}" y="${ry2+30}" text-anchor="middle" font-size="14" fill="#7DD3FC">${a0}×${b}=${units}${carry>0?' | העברה: '+carry:''}</text>`;
  } else {
    // full result — tens and units
    const r1=Math.floor(result/10), r0=result%10;
    svg+=`<text x="${col1+cw/2}" y="${ry2}" text-anchor="middle" font-size="34" fill="#FBBF24">${r1}</text>`;
    svg+=`<text x="${col2+cw/2}" y="${ry2}" text-anchor="middle" font-size="34" fill="#FBBF24">${r0}</text>`;
  }

  svg+=`</svg>`;
  return `<div style="display:flex;justify-content:center">${svg}</div>`;
}

function rectVis(w, h, mode){
  // mode: 'plain', 'perimeter', 'area', 'both'
  const svgW=260, svgH=170;
  const rx=30, ry=20, rw=200, rh=100;
  let fillColor = mode==='area'||mode==='both' ? 'rgba(244,114,182,.25)' : 'rgba(255,255,255,.05)';
  let strokeCol = mode==='perimeter'||mode==='both' ? '#FBBF24' : 'rgba(255,255,255,.4)';
  let sw = mode==='perimeter'||mode==='both' ? 4 : 2;

  let svg=`<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="direction:ltr">`;
  svg+=`<rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" fill="${fillColor}" stroke="${strokeCol}" stroke-width="${sw}" rx="6"/>`;
  // labels
  svg+=`<text x="${rx+rw/2}" y="${ry-6}" text-anchor="middle" fill="#F0F9FF" font-size="16" font-family="Nunito" font-weight="800">${w}</text>`;
  svg+=`<text x="${rx+rw+8}" y="${ry+rh/2+5}" text-anchor="start" fill="#F0F9FF" font-size="16" font-family="Nunito" font-weight="800">${h}</text>`;
  if(mode==='perimeter'||mode==='both'){
    // arrows on all sides
    svg+=`<text x="${rx+rw/2}" y="${ry+rh+18}" text-anchor="middle" fill="#FBBF24" font-size="13" font-family="Nunito" font-weight="800">${w}</text>`;
    svg+=`<text x="${rx-12}" y="${ry+rh/2+5}" text-anchor="end" fill="#FBBF24" font-size="13" font-family="Nunito" font-weight="800">${h}</text>`;
  }
  if(mode==='area'||mode==='both'){
    // grid hint
    for(let i=1;i<w;i++){
      const x=rx+i*(rw/w);
      svg+=`<line x1="${x}" y1="${ry}" x2="${x}" y2="${ry+rh}" stroke="rgba(244,114,182,.3)" stroke-width="1"/>`;
    }
    for(let j=1;j<h;j++){
      const y=ry+j*(rh/h);
      svg+=`<line x1="${rx}" y1="${y}" x2="${rx+rw}" y2="${y}" stroke="rgba(244,114,182,.3)" stroke-width="1"/>`;
    }
    svg+=`<text x="${rx+rw/2}" y="${ry+rh/2+6}" text-anchor="middle" fill="#F472B6" font-size="22" font-family="Nunito" font-weight="900">${w*h}</text>`;
  }
  svg+=`</svg>`;
  return svg;
}

  document.getElementById('step-speech').style.animation='none';
  void document.getElementById('step-speech').offsetWidth;
  document.getElementById('step-speech').style.animation='';

  // visual
  const vis=document.getElementById('step-visual');
  try{ vis.innerHTML=step.visual(); } catch(e){ vis.innerHTML=`<div style="color:var(--muted)">⚠️ שגיאה בטעינה</div>`; console.error(e); }
  vis.style.animation='none';void vis.offsetWidth;vis.style.animation='';

  // nav buttons
  document.getElementById('btn-prev').style.opacity=curStep===0?'0.3':'1';
  const isLast=curStep===t.steps.length-1;
  const nextBtn=document.getElementById('btn-next');
  nextBtn.textContent=isLast?'לתרגול! 🎮':'הבא ←';
  nextBtn.style.background=isLast?`linear-gradient(135deg,${t.color},${t.color}aa)`:t.color;
}

function nextStep(){
  const t=TOPICS[curTopic];
  if(curStep<t.steps.length-1){curStep++;renderStep();}
  else{setMode('practice');}
}
function prevStep(){if(curStep>0){curStep--;renderStep();}}

/* ─── PRACTICE ─── */
function resetPracticeStats(){
  document.getElementById('st-streak').textContent='0';
  document.getElementById('st-ok').textContent='0';
  document.getElementById('st-stars').textContent=S.stars||0;
}

function newQ(){
  const t=TOPICS[curTopic];
  CQ=t.genQ();busy=false;bv={1:'',2:''};ab=1;
  const card=document.getElementById('q-card');
  card.classList.remove('flash-ok','flash-ng');

  // display
  const lbl=document.getElementById('q-label');
  const disp=document.getElementById('q-display');
  const arow=document.getElementById('arow');

  if(CQ.type==='multv'){
    lbl.textContent='כפל במאונך';
    disp.className='q-display';
    disp.style.fontSize='';
    const a1=Math.floor(CQ.num1/10), a0=CQ.num1%10;
    const cw=44, x0=30, row1=14, row2=row1+48, row3=row2+48;
    const svgW=x0*2+cw*2+10, svgH=row3+60;
    disp.innerHTML=`<div style="display:flex;justify-content:center">
      <svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="direction:ltr;font-family:Nunito,Arial;font-weight:900">
        <text x="${x0+cw/2}" y="${row2}" text-anchor="middle" font-size="34" fill="#F0F9FF">${a1}</text>
        <text x="${x0+cw+cw/2}" y="${row2}" text-anchor="middle" font-size="34" fill="#F0F9FF">${a0}</text>
        <text x="${x0+cw/2}" y="${row3}" text-anchor="middle" font-size="28" fill="#94A3B8">×</text>
        <text x="${x0+cw+cw/2}" y="${row3}" text-anchor="middle" font-size="34" fill="#F0F9FF">${CQ.num2}</text>
        <line x1="${x0-4}" y1="${row3+14}" x2="${svgW-x0+4}" y2="${row3+14}" stroke="rgba(255,255,255,.45)" stroke-width="2.5" stroke-linecap="round"/>
        <text x="${x0+cw/2}" y="${row3+56}" text-anchor="middle" font-size="34" fill="rgba(255,255,255,.25)">?</text>
        <text x="${x0+cw+cw/2}" y="${row3+56}" text-anchor="middle" font-size="34" fill="rgba(255,255,255,.25)">?</text>
      </svg>
    </div>`;
  } else if(CQ.type==='frac'){
    lbl.textContent='חיבור/חיסור שברים';
    disp.className='q-display';
    const op=CQ.op==='+' ? '+' : '−';
    disp.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;gap:14px;direction:ltr;font-size:32px;font-weight:900">
      ${fracDisplay(CQ.n1,CQ.denom)}
      <span>${op}</span>
      ${fracDisplay(CQ.n2,CQ.denom)}
      <span>=</span>
    </div>`;
  } else if(CQ.type==='whole'){
    lbl.textContent='השלמת שבר לשלם';
    disp.className='q-display';
    disp.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;gap:10px;direction:ltr;font-size:32px;font-weight:900">
      ${fracDisplay(CQ.n,CQ.denom)}
      <span style="font-size:26px">+</span>
      ${fracDisplay('?',CQ.denom)}
      <span style="font-size:26px">=</span>
      ${fracDisplay(CQ.denom,CQ.denom)}
    </div>`;
  } else if(CQ.type==='rect_p'){
    lbl.textContent='חישוב היקף';
    disp.className='q-display';
    disp.style.fontSize='20px';
    disp.innerHTML=`
      <div style="display:flex;justify-content:center;margin-bottom:8px">${rectVis(CQ.w,CQ.h,'perimeter')}</div>
      <div style="text-align:center;line-height:1.8">היקף = ?</div>`;
  } else if(CQ.type==='rect_a'){
    lbl.textContent='חישוב שטח';
    disp.className='q-display';
    disp.style.fontSize='20px';
    disp.innerHTML=`
      <div style="display:flex;justify-content:center;margin-bottom:8px">${rectVis(CQ.w,CQ.h,'area')}</div>
      <div style="text-align:center;line-height:1.8">שטח = ?</div>`;
  } else {
    lbl.textContent='חילוק עם שארית';
    disp.className='q-display';
    disp.style.fontSize='34px';
    disp.textContent=CQ.display;
  }

  // answer boxes
  if(CQ.type==='rem'){
    arow.innerHTML=`<div class="abox act emp" id="ab1" onclick="focusB(1)">?</div><span class="rlbl">שארית</span><div class="abox emp" id="ab2" onclick="focusB(2)">?</div>`;
  } else if(CQ.type==='frac'){
    arow.innerHTML=`<div class="abox act emp" id="ab1">?</div><span class="rlbl" style="font-size:20px">/ ${CQ.denom}</span>`;
  } else {
    arow.innerHTML=`<div class="abox act emp" id="ab1">?</div>`;
  }

  // feedback reset
  const fb=document.getElementById('fbrow');
  fb.className='fbrow idle';
  document.getElementById('fbani').textContent='✨';
  document.getElementById('fbmsg').textContent='ענה נכון ותצברי כוכבים! 🌟';
}

/* ─── NUMPAD ─── */
function nk(n){if(busy)return;const c=bv[ab]||'';if(c.length>=4)return;bv[ab]=c+n;rb(ab);}
function nd(){if(busy)return;bv[ab]=(bv[ab]||'').slice(0,-1);rb(ab);}
function rb(b){const el=document.getElementById('ab'+b);if(!el)return;const v=bv[b];el.textContent=v===''?'?':v;el.classList.toggle('emp',v==='');}
function focusB(b){ab=b;[1,2].forEach(i=>{const el=document.getElementById('ab'+i);if(el)el.classList.toggle('act',i===b);});}
function no(){if(busy)return;if(CQ.type==='rem'&&ab===1&&bv[1]!==''){focusB(2);return;}checkAns();}

function idk(){
  if(busy)return;
  busy=true;
  setFb('לא נורא! '+CQ.hint+'\nנסי שאלה אחרת 😊',false);
  setTimeout(newQ,1900);
}

const OKM=['וואו! מדהים! 🌟','נכון! גאונה! ⭐','מושלם! 🎯','יפה מאוד! 🌈','אחלה! 🔥','סופר! 😎','מעולה! 🏆','נכון לגמרי! 🎉'];
const NGM=['כמעט! ננסה שוב 💪','לא נכון, אבל לא נורא! 🌸','נסי שוב 🌟','טעות קטנה — נמשיך! 😊'];
const EMOJS=['✨','🌟','💫','⭐','🎯','🎉','🌺','🔥','💎','🌈'];

function checkAns(){
  if(busy||!CQ)return;
  const v1=parseInt(bv[1]);if(isNaN(v1)){focusB(1);return;}
  let ok;
  if(CQ.type==='rem'){const v2=parseInt(bv[2]);if(isNaN(v2)){focusB(2);return;}ok=(v1===CQ.a1&&v2===CQ.a2);}
  else ok=(v1===CQ.a1);

  const card=document.getElementById('q-card');
  card.classList.remove('flash-ok','flash-ng');void card.offsetWidth;

  if(ok){
    card.classList.add('flash-ok');
    S.streak=(S.streak||0)+1;S.stars=(S.stars||0)+1;
    S.topicOk[curTopic]=S.topicOk[curTopic]||0;
    S.topicOk[TOPICS[curTopic].id]=(S.topicOk[TOPICS[curTopic].id]||0)+1;
    saveState();
    document.getElementById('st-streak').textContent=S.streak;
    document.getElementById('st-ok').textContent=parseInt(document.getElementById('st-ok').textContent)+1;
    document.getElementById('st-stars').textContent=S.stars;
    setFb(OKM[ri(OKM.length)],true);
    if(S.streak>0&&S.streak%5===0) setTimeout(()=>showMilestone(),700);
    busy=true;setTimeout(newQ,700);
  } else {
    card.classList.add('flash-ng');
    S.streak=0;saveState();
    document.getElementById('st-streak').textContent=0;
    setFb(NGM[ri(NGM.length)]+'\n'+CQ.hint,false);
    busy=true;setTimeout(newQ,1900);
  }
}

function setFb(msg,ok){
  const fb=document.getElementById('fbrow');
  fb.className='fbrow '+(ok?'ok':'ng');
  document.getElementById('fbani').textContent=EMOJS[ri(EMOJS.length)];
  document.getElementById('fbmsg').textContent=msg;
}

function showMilestone(){
  document.getElementById('memj').textContent='🏆';
  document.getElementById('mtit').textContent='רצף של '+S.streak+'!';
  document.getElementById('mbod').textContent='את על הגל! ממשיכים! 🌊';
  document.getElementById('bmoo').style.background=TOPICS[curTopic].color;
  document.getElementById('modal').classList.add('on');
  confetti();
}
function closeModal(){document.getElementById('modal').classList.remove('on');busy=false;}

function confetti(){
  const cs=['#FB923C','#FBBF24','#A78BFA','#34D399','#F472B6','#60A5FA'];
  for(let i=0;i<50;i++){
    const d=document.createElement('div');d.className='cc';
    d.style.left=Math.random()*100+'vw';
    d.style.width=(6+Math.random()*9)+'px';d.style.height=(6+Math.random()*9)+'px';
    d.style.background=cs[ri(cs.length)];
    d.style.borderRadius=Math.random()>.5?'50%':'3px';
    d.style.animationDuration=(1.2+Math.random()*1.6)+'s';
    d.style.animationDelay=Math.random()*.5+'s';
    document.body.appendChild(d);setTimeout(()=>d.remove(),3200);
  }
}

/* ─── INIT ─── */
loadState();
renderHome();
</script>
